# DA3-Metric finetune on KITTI Eigen split
# Init: DA3-LARGE (relative-depth pretrained)
# Loss: SiLog + L1(log) + multi-scale grad

out_dir: /home/izi2sgh/MYDATA/quanjie/liren/DA3-Metric-Repro/runs/da3metric_kitti_v0

device: cuda
amp: bf16
process_res: 504

model:
  init_ckpt: /home/izi2sgh/MYDATA/quanjie/liren/DA3-Metric-Repro/checkpoints/DA3-LARGE
  freeze_backbone: true     # phase A: only train DPT + metric head

data:
  kitti:
    data_root: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/kitti_root
    split_file: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/splits/eigen_train_files.txt
    min_depth: 0.001
    max_depth: 80.0

loss:
  w_silog: 1.0
  w_l1: 0.1
  w_grad: 0.5
  silog_variance_focus: 0.85

train:
  batch_size: 4              # H200 80GB; raise to 8 once memory profile confirmed
  num_workers: 6
  max_epochs: 8
  lr: 5.0e-5                 # decoder lr
  backbone_lr_factor: 0.1    # frozen anyway in phase A
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip: 1.0
  log_every: 20
  eval_every: 500
  save_every: 1000
