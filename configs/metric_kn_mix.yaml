# DA3-Metric finetune on KITTI + NYU mix
# Init: self-trained step_046000 (from KITTI-only run v0) for warm start
# Goal: fix NYU collapse while keeping KITTI gains.
# Sampling: NYU is much smaller (795) than KITTI (23157), so sample
# probs are biased to upweight NYU.

out_dir: /home/izi2sgh/MYDATA/quanjie/liren/DA3-Metric-Repro/runs/da3metric_kn_v1

device: cuda
amp: bf16
process_res: 504

model:
  # Continue from KITTI-only run rather than DA3-LARGE: re-init would
  # waste the metric scale we already learned. The state_dict has
  # api.* + net.* aliases; load_state_dict tolerates both.
  init_ckpt: /home/izi2sgh/MYDATA/quanjie/liren/DA3-Metric-Repro/checkpoints/DA3-LARGE
  resume_from: /home/izi2sgh/MYDATA/quanjie/liren/DA3-Metric-Repro/runs/da3metric_kitti_v0/ckpts/step_046000.pt
  freeze_backbone: true

data:
  # 50/50 sampling; with batch_size=4 each step picks one source.
  sample_probs: [0.5, 0.5]
  kitti:
    data_root: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/kitti_root
    split_file: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/splits/eigen_train_files.txt
    min_depth: 0.001
    max_depth: 80.0
  nyu:
    data_root: /fs/scratch/datasets/cr_dlp_open_permissive/nyuv2/nyu_depth_v2/nyuv2
    split_file: /fs/scratch/datasets/cr_dlp_open_permissive/nyuv2/nyu_depth_v2/nyuv2/train.txt
    min_depth: 0.001
    max_depth: 10.0

loss:
  w_silog: 1.0
  w_l1: 0.1
  w_grad: 0.5
  silog_variance_focus: 0.85

train:
  batch_size: 4
  num_workers: 6
  max_epochs: 4              # ~4*5789 = 23k steps; quicker than v0
  lr: 3.0e-5                 # lower since we're warm-starting
  backbone_lr_factor: 0.1
  weight_decay: 0.01
  warmup_steps: 200
  grad_clip: 1.0
  log_every: 20
  eval_every: 500
  save_every: 2000
